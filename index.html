<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HospedaFacil Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --sidebar-width: 240px; --bg-body: #f4f7f9; --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --border: #e1e8ed; --dark: #1a252f; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-body); margin: 0; display: flex; height: 100vh; color: #2c3e50; }
        
        /* Tela de Login */
        #tela-login { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; color: #2c3e50; text-align: center; }
        .login-btn { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-jenny { background: #3498db; color: white; }
        .btn-imperador { background: #9b59b6; color: white; }
        .btn-adm { background: #2c3e50; color: white; border: 1px solid #bdc3c7; margin-top: 20px; }

        /* Estrutura Principal */
        .sidebar { width: var(--sidebar-width); background: var(--dark); color: white; display: none; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; font-weight: 800; border-bottom: 1px solid #2c3e50; }
        .sidebar-nav { flex: 1; padding: 10px 0; }
        .nav-btn { width: 100%; border: none; background: none; color: #bdc3c7; padding: 15px 25px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .nav-btn.active { background: var(--primary); color: white; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; display: none; }
        
        .content-section { display: none; max-width: 900px; margin: auto; }
        .content-section.active { display: block; }
        .card-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .painel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .col-header { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 11px; }
        .bg-ent { background: rgba(46, 204, 113, 0.1); color: var(--success); }
        .bg-sai { background: rgba(231, 76, 60, 0.1); color: var(--danger); }
        .apto-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; background: white; padding: 15px; }
        .date-badge { font-size: 10px; color: #7f8c8d; background: #f8f9fa; padding: 2px 6px; border-radius: 4px; border: 1px solid #eee; margin-top: 5px; display: inline-block; }
        .tag-predio { font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; margin-right: 5px; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .hospede-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .hospede-row input:first-child { flex: 2; } 
        .hospede-row input:last-child { flex: 1; }

        body.mobile-mode .sidebar { width: 100%; height: 65px; flex-direction: row; position: fixed; bottom: 0; z-index: 100; }
        body.mobile-mode .sidebar-header, body.mobile-mode .footer-sidebar { display: none; }
        body.mobile-mode .sidebar-nav { display: flex; width: 100%; justify-content: space-around; padding: 0; }
        body.mobile-mode .nav-btn { flex-direction: column; font-size: 8px; padding: 10px 5px; text-align: center; justify-content: center; gap: 2px; }
        body.mobile-mode .main-content { padding: 15px; padding-bottom: 90px; }
        body.mobile-mode .painel-grid { grid-template-columns: 1fr; }
    </style>
</head>
<body id="mainBody">

<div id="tela-login">
    <div class="login-box">
        <h3>HospedaFacil</h3>
        <button class="login-btn btn-jenny" onclick="fazerLogin('Jenny')">Painel JENNY</button>
        <button class="login-btn btn-imperador" onclick="fazerLogin('Imperador')">Painel IMPERADOR</button>
        <hr style="margin: 20px 0; opacity: 0.2;">
        <button class="login-btn btn-adm" onclick="loginADM()">ACESSO ADMIN</button>
    </div>
</div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">🏢 <span id="nomePredioLogado">---</span></div>
    <nav class="sidebar-nav">
        <button class="nav-btn active" onclick="trocarAba(event, 'aba-painel')">📅 Painel</button>
        <button id="nav-reserva" class="nav-btn" onclick="trocarAba(event, 'aba-registro')">➕ Reserva</button>
        <button class="nav-btn" onclick="trocarAba(event, 'aba-historico')">📂 Histórico</button>
        <button id="nav-config" class="nav-btn" onclick="trocarAba(event, 'aba-config')">⚙️ Unidades</button>
    </nav>
    <div class="footer-sidebar" style="padding: 15px;">
        <button onclick="logout()" style="width:100%; padding:8px; margin-bottom:5px; cursor:pointer; background:none; color:white; border:1px solid #444; border-radius:5px;">Sair</button>
    </div>
</aside>

<main class="main-content" id="mainContent">
    <div id="aba-painel" class="content-section active">
        <h2 id="tituloHoje">Hoje</h2>
        <div class="painel-grid">
            <div><div class="col-header bg-ent">📥 CHECK-IN</div><div id="listaEntradas"></div></div>
            <div><div class="col-header bg-sai">📤 CHECK-OUT</div><div id="listaSaidas"></div></div>
        </div>
    </div>

    <div id="aba-registro" class="content-section">
        <h2>📝 Nova Reserva</h2>
        <div class="card-box">
            <label>Prédio</label>
            <select id="regPredio" onchange="carregarAptosRegistro()"></select>
            <label>Unidade</label><select id="selectApto"></select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Entrada</label><input type="date" id="dataEntrada"></div>
                <div style="flex:1"><label>Saída</label><input type="date" id="dataSaida"></div>
            </div>
            <div id="containerHospedes">
                <div class="hospede-row"><input type="text" class="nome-input" placeholder="Nome"><input type="text" class="cpf-input" placeholder="CPF"></div>
            </div>
            <button onclick="adicionarCampoHospede()" style="margin: 10px 0; cursor:pointer;">+ Hóspede</button>
            <button class="btn-primary" onclick="salvar()">Salvar Reserva</button>
        </div>
    </div>

    <div id="aba-historico" class="content-section"><h2>📂 Histórico</h2><div id="listaGeral"></div></div>
    
    <div id="aba-config" class="content-section">
        <h2>⚙️ Configuração</h2>
        <div class="card-box">
            <label>Prédio</label>
            <select id="novoAptoPredio"><option value="Jenny">Jenny</option><option value="Imperador">Imperador</option></select>
            <input type="text" id="novoAptoNome" placeholder="Número da Unidade">
            <button class="btn-primary" onclick="addUnidade()">Adicionar Unidade</button>
        </div>
        <div id="listaUnidadesCadastradas"></div>
    </div>
</main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD10VDzmYJCeubBnEPGhbiddOgxazohe",
        authDomain: "hospedafacil-30521.firebaseapp.com",
        databaseURL: "https://hospedafacil-30521-default-rtdb.firebaseio.com/",
        projectId: "hospedafacil-30521",
        storageBucket: "hospedafacil-30521.firebasestorage.app",
        messagingSenderId: "982294374795",
        appId: "1:982294374795:web:582187cbccbe22bb7ce78e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userRole = null; // 'Jenny', 'Imperador' ou 'ADM'
    let dadosReservas = {};
    let dadosAptos = {};

    function loginADM() {
        const pass = prompt("Digite a senha de Administrador:");
        if(pass === "DanielDennisRamon") { fazerLogin('ADM'); } else { alert("Senha incorreta!"); }
    }

    function fazerLogin(role) {
        userRole = role;
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('nomePredioLogado').innerText = role === 'ADM' ? 'ADMINISTRADOR' : role;
        
        // Esconder abas se não for ADM
        if(role !== 'ADM') {
            document.getElementById('nav-reserva').style.display = 'none';
            document.getElementById('nav-config').style.display = 'none';
        }
        
        const regPredio = document.getElementById('regPredio');
        regPredio.innerHTML = role === 'ADM' ? '<option value="Jenny">Jenny</option><option value="Imperador">Imperador</option>' : `<option value="${role}">${role}</option>`;
        
        carregarAptosRegistro();
        renderizarTudo();
    }

    function carregarAptosRegistro() {
        const predio = document.getElementById('regPredio').value;
        const sel = document.getElementById('selectApto');
        sel.innerHTML = '<option value="">-- Selecione --</option>';
        Object.keys(dadosAptos).forEach(key => {
            if(dadosAptos[key].predio === predio) sel.innerHTML += `<option value="${key}">${key}</option>`;
        });
    }

    function logout() { location.reload(); }
    function formatar(d) { return d ? d.split('-').reverse().join('/') : ""; }

    function adicionarCampoHospede() {
        const div = document.createElement('div');
        div.className = 'hospede-row';
        div.innerHTML = `<input type="text" class="nome-input" placeholder="Nome"><input type="text" class="cpf-input" placeholder="CPF">`;
        document.getElementById('containerHospedes').appendChild(div);
    }

    db.ref('aptos').on('value', snap => { dadosAptos = snap.val() || {}; renderizarTudo(); carregarAptosRegistro(); });
    db.ref('reservas').on('value', snap => { dadosReservas = snap.val() || {}; renderizarTudo(); });

    function renderizarTudo() {
        if (!userRole) return;
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('tituloHoje').innerText = "Hoje: " + formatar(hoje);
        
        const listaConf = document.getElementById('listaUnidadesCadastradas');
        listaConf.innerHTML = '';
        
        Object.keys(dadosAptos).forEach(key => {
            const p = dadosAptos[key].predio;
            if(userRole === 'ADM' || p === userRole) {
                listaConf.innerHTML += `<div class="card-box" style="display:flex; justify-content:space-between; padding:10px;">
                    <span>[${p}] Unidade ${key}</span>
                    ${userRole === 'ADM' ? `<button onclick="db.ref('aptos/${key}').remove()" style="color:red; border:none; background:none;">✕</button>` : ''}
                </div>`;
            }
        });

        const cEnt = document.getElementById('listaEntradas');
        const cSai = document.getElementById('listaSaidas');
        const cHist = document.getElementById('listaGeral');
        cEnt.innerHTML = ''; cSai.innerHTML = ''; cHist.innerHTML = '';

        Object.keys(dadosReservas).forEach(key => {
            const r = dadosReservas[key];
            const infoApto = dadosAptos[r.apto] || {};
            const p = infoApto.predio;
            
            if(userRole === 'ADM' || p === userRole) {
                let hospedesHTML = r.hospedes ? r.hospedes.map(h => `👤 ${h.nome}`).join(', ') : "---";
                const corTag = p === 'Jenny' ? '#3498db' : '#9b59b6';
                
                const cardHtml = `<div class="apto-card">
                    <span class="tag-predio" style="background:${corTag}; color:white">${p}</span><b>🏠 ${r.apto}</b><br>
                    <div class="date-badge">📅 ${formatar(r.e)} até ${formatar(r.s)}</div><br><small>${hospedesHTML}</small></div>`;

                if(r.e === hoje) cEnt.innerHTML += cardHtml;
                if(r.s === hoje) cSai.innerHTML += cardHtml;
                
                cHist.innerHTML += `<div class="card-box" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><span class="tag-predio" style="background:${corTag}; color:white">${p}</span><b>${r.apto}</b> (${formatar(r.e)} - ${formatar(r.s)})<br><small>${hospedesHTML}</small></div>
                    ${userRole === 'ADM' ? `<button onclick="db.ref('reservas/${key}').remove()" style="color:red; border:none; background:none;">✕</button>` : ''}
                </div>`;
            }
        });
    }

    function salvar() {
        const apto = document.getElementById('selectApto').value;
        const e = document.getElementById('dataEntrada').value;
        const s = document.getElementById('dataSaida').value;
        const nomes = document.querySelectorAll('.nome-input');
        const cpfs = document.querySelectorAll('.cpf-input');
        const hospedes = Array.from(nomes).map((n, i) => ({ nome: n.value, cpf: cpfs[i].value })).filter(h => h.nome);

        if(!apto || !e || !s || hospedes.length == 0) return alert("Preencha tudo!");
        
        const conflito = Object.values(dadosReservas).find(r => r.apto === apto && ((e >= r.e && e < r.s) || (s > r.e && s <= r.s)));
        if (conflito) return alert(`⚠️ Ocupado até ${formatar(conflito.s)}.`);
        
        db.ref('reservas').push({ apto, e, s, hospedes }).then(() => {
            alert("Reserva Salva!");
            trocarAba(null, 'aba-painel');
        });
    }

    function addUnidade() {
        const n = document.getElementById('novoAptoNome').value;
        const p = document.getElementById('novoAptoPredio').value;
        if(n) db.ref('aptos/' + n).set({ predio: p }).then(() => document.getElementById('novoAptoNome').value = '');
    }

    function trocarAba(event, id) {
        document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        if(event) event.currentTarget.classList.add("active");
    }
</script>
</body>
</html>
