<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HospedaFacil Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --sidebar-width: 240px; --bg-body: #f4f7f9; --bg-card: #ffffff; --primary: #3498db; --text-main: #2c3e50; --text-sub: #7f8c8d; --success: #2ecc71; --danger: #e74c3c; --border: #e1e8ed; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-body); margin: 0; display: flex; height: 100vh; color: var(--text-main); transition: all 0.3s ease; }
        
        .sidebar { width: var(--sidebar-width); background: #1a252f; color: white; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; transition: 0.3s; }
        .sidebar-header { padding: 30px 20px; font-weight: 800; font-size: 1.1rem; border-bottom: 1px solid #2c3e50; }
        .sidebar-nav { flex: 1; padding: 10px 0; }
        .nav-btn { width: 100%; border: none; background: none; color: #bdc3c7; padding: 15px 25px; text-align: left; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .nav-btn.active { background: var(--primary); color: white; }

        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .content-section { display: none; max-width: 900px; margin: auto; animation: fadeIn 0.3s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .painel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .col-header { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 12px; }
        .bg-ent { background: rgba(46, 204, 113, 0.1); color: var(--success); }
        .bg-sai { background: rgba(231, 76, 60, 0.1); color: var(--danger); }

        .apto-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; background: white; padding: 12px; }
        .badge { padding: 3px 8px; border-radius: 20px; font-size: 10px; color: white; float: right; }
        .badge-limpo { background: var(--success); }
        .badge-sujo { background: var(--danger); }
        
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* MODO CELULAR */
        body.mobile-mode { flex-direction: column; }
        body.mobile-mode .sidebar { width: 100%; height: 65px; flex-direction: row; position: fixed; bottom: 0; }
        body.mobile-mode .sidebar-header { display: none; }
        body.mobile-mode .sidebar-nav { display: flex; width: 100%; justify-content: space-around; padding: 0; }
        body.mobile-mode .nav-btn { flex-direction: column; font-size: 9px; padding: 8px; text-align: center; justify-content: center; }
        body.mobile-mode .main-content { padding: 15px; padding-bottom: 80px; }
        body.mobile-mode .painel-grid { grid-template-columns: 1fr; }
        body.mobile-mode .footer-sidebar { display: none; }
    </style>
</head>
<body id="mainBody">

<aside class="sidebar">
    <div class="sidebar-header">🏢 HOSPEDA+ CLOUD</div>
    <nav class="sidebar-nav">
        <button class="nav-btn active" onclick="trocarAba(event, 'aba-painel')">📅 Painel</button>
        <button class="nav-btn" onclick="trocarAba(event, 'aba-registro')">➕ Reserva</button>
        <button class="nav-btn" onclick="trocarAba(event, 'aba-historico')">📂 Histórico</button>
        <button class="nav-btn" onclick="trocarAba(event, 'aba-config')">⚙️ Unidades</button>
    </nav>
    <div class="footer-sidebar" style="padding: 15px;">
        <button onclick="toggleView()" style="width:100%; padding:8px; font-size:10px; cursor:pointer; background:#2c3e50; color:white; border:1px solid #444; border-radius:5px;">📱 Modo Celular</button>
    </div>
</aside>

<main class="main-content">
    <div id="aba-painel" class="content-section active">
        <h2 id="tituloHoje">Carregando...</h2>
        <div class="painel-grid">
            <div><div class="col-header bg-ent">📥 ENTRADAS HOJE</div><div id="listaEntradas"></div></div>
            <div><div class="col-header bg-sai">📤 SAÍDAS HOJE</div><div id="listaSaidas"></div></div>
        </div>
    </div>

    <div id="aba-registro" class="content-section">
        <h2>📝 Nova Reserva</h2>
        <div class="card-box">
            <label>Apartamento</label><select id="selectApto"></select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Entrada</label><input type="date" id="dataEntrada"></div>
                <div style="flex:1"><label>Saída</label><input type="date" id="dataSaida"></div>
            </div>
            <label>Hóspedes</label>
            <div id="listaNomes"><input type="text" class="nome-input" placeholder="Nome principal"></div>
            <button class="btn-primary" onclick="salvar()">Sincronizar Reserva ☁️</button>
        </div>
    </div>

    <div id="aba-historico" class="content-section"><h2>📂 Histórico Geral</h2><div id="listaGeral"></div></div>
    
    <div id="aba-config" class="content-section">
        <h2>⚙️ Gerenciar Unidades</h2>
        <div class="card-box">
            <input type="text" id="novoAptoNome" placeholder="Ex: Apto 101">
            <button class="btn-primary" onclick="addUnidade()">Adicionar Unidade</button>
        </div>
        <div id="listaUnidadesCadastradas"></div>
    </div>
</main>

<script>
    // CONFIGURAÇÃO DO SEU FIREBASE (DENNIS)
    const firebaseConfig = {
        apiKey: "AIzaSyD10VDzmYJCeubBnEPGhbiddOgxazohe",
        authDomain: "hospedafacil-30521.firebaseapp.com",
        databaseURL: "https://hospedafacil-30521-default-rtdb.firebaseio.com/",
        projectId: "hospedafacil-30521",
        storageBucket: "hospedafacil-30521.firebasestorage.app",
        messagingSenderId: "982294374795",
        appId: "1:982294374795:web:582187cbccbe22bb7ce78e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function formatar(d) { return d ? d.split('-').reverse().join('/') : ""; }

    // --- BANCO DE DADOS EM TEMPO REAL ---
    db.ref('aptos').on('value', snap => {
        const aptos = snap.val() || {};
        const sel = document.getElementById('selectApto');
        const lista = document.getElementById('listaUnidadesCadastradas');
        if(sel) {
            sel.innerHTML = '<option value="">-- Selecione --</option>';
            lista.innerHTML = '';
            Object.keys(aptos).forEach(a => {
                sel.innerHTML += `<option value="${a}">${a}</option>`;
                lista.innerHTML += `<div class="card-box" style="display:flex; justify-content:space-between; padding:10px; margin-bottom:5px;">🏠 ${a} <button onclick="db.ref('aptos/${a}').remove()" style="color:red; background:none; border:none; cursor:pointer;">Remover</button></div>`;
            });
        }
    });

    db.ref('reservas').on('value', snap => {
        const reservas = snap.val() || {};
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('tituloHoje').innerText = "Hoje: " + formatar(hoje);
        
        const cEnt = document.getElementById('listaEntradas');
        const cSai = document.getElementById('listaSaidas');
        const cHist = document.getElementById('listaGeral');
        cEnt.innerHTML = ''; cSai.innerHTML = ''; cHist.innerHTML = '';

        db.ref('aptos').once('value', aSnap => {
            const statusAptos = aSnap.val() || {};
            Object.keys(reservas).forEach(key => {
                const r = reservas[key];
                const st = statusAptos[r.apto] || 'limpo';
                const card = `
                    <div class="apto-card">
                        <span class="badge badge-${st}">${st}</span>
                        <b>🏠 ${r.apto}</b><br>
                        <small>👤 ${r.nomes.join(', ')}</small><br>
                        <div style="margin-top:8px; display:flex; gap:5px;">
                            <button onclick="setLimpeza('${r.apto}','limpo')" style="font-size:9px; cursor:pointer;">Limpo</button>
                            <button onclick="setLimpeza('${r.apto}','sujo')" style="font-size:9px; cursor:pointer;">Sujo</button>
                        </div>
                    </div>`;
                
                if(r.e === hoje) cEnt.innerHTML += card;
                if(r.s === hoje) cSai.innerHTML += card;
                
                cHist.innerHTML += `<div class="card-box" style="display:flex; justify-content:space-between;">
                    <div><b>${r.apto}</b> (${formatar(r.e)} - ${formatar(r.s)})<br><small>${r.nomes.join(', ')}</small></div>
                    <button onclick="db.ref('reservas/${key}').remove()" style="color:red; background:none; border:none; cursor:pointer;">✕</button>
                </div>`;
            });
        });
    });

    // --- AÇÕES ---
    function salvar() {
        const apto = document.getElementById('selectApto').value;
        const e = document.getElementById('dataEntrada').value;
        const s = document.getElementById('dataSaida').value;
        const nomes = Array.from(document.querySelectorAll('.nome-input')).map(i => i.value).filter(v => v);
        if(!apto || !e || !s || nomes.length == 0) return alert("Preencha tudo!");
        
        db.ref('reservas').push({ apto, e, s, nomes }).then(() => {
            alert("Reserva enviada para a nuvem!");
            trocarAba(null, 'aba-painel');
        });
    }

    function addUnidade() {
        const n = document.getElementById('novoAptoNome').value;
        if(n) db.ref('aptos/' + n).set('limpo').then(() => document.getElementById('novoAptoNome').value = '');
    }

    function setLimpeza(apto, status) { db.ref('aptos/' + apto).set(status); }

    function trocarAba(event, id) {
        document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        if(event) event.currentTarget.classList.add("active");
    }

    function toggleView() { document.getElementById('mainBody').classList.toggle('mobile-mode'); }
</script>
</body>
</html>
