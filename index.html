<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HospedaFacil Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --sidebar-width: 240px; --bg-body: #f4f7f9; --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --border: #e1e8ed; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-body); margin: 0; display: flex; height: 100vh; color: #2c3e50; }
        .sidebar { width: var(--sidebar-width); background: #1a252f; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; font-weight: 800; border-bottom: 1px solid #2c3e50; }
        .sidebar-nav { flex: 1; padding: 10px 0; }
        .nav-btn { width: 100%; border: none; background: none; color: #bdc3c7; padding: 15px 25px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .nav-btn.active { background: var(--primary); color: white; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .content-section { display: none; max-width: 900px; margin: auto; }
        .content-section.active { display: block; }
        .card-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .painel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .col-header { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 13px; }
        .bg-ent { background: rgba(46, 204, 113, 0.1); color: var(--success); }
        .bg-sai { background: rgba(231, 76, 60, 0.1); color: var(--danger); }
        .apto-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; background: white; padding: 15px; position: relative; }
        .date-badge { font-size: 10px; color: #7f8c8d; background: #f8f9fa; padding: 2px 6px; border-radius: 4px; border: 1px solid #eee; margin-top: 5px; display: inline-block; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .hospede-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .hospede-row input:first-child { flex: 2; } 
        .hospede-row input:last-child { flex: 1; }

        body.mobile-mode { flex-direction: column; }
        body.mobile-mode .sidebar { width: 100%; height: 65px; flex-direction: row; position: fixed; bottom: 0; z-index: 100; }
        body.mobile-mode .sidebar-header, body.mobile-mode .footer-sidebar { display: none; }
        body.mobile-mode .sidebar-nav { display: flex; width: 100%; justify-content: space-around; padding: 0; }
        body.mobile-mode .nav-btn { flex-direction: column; font-size: 8px; padding: 10px 5px; text-align: center; justify-content: center; gap: 2px; }
        body.mobile-mode .main-content { padding: 15px; padding-bottom: 90px; }
        body.mobile-mode .painel-grid { grid-template-columns: 1fr; }
    </style>
</head>
<body id="mainBody">

<aside class="sidebar">
    <div class="sidebar-header">🏢 HOSPEDA+ CLOUD</div>
    <nav class="sidebar-nav">
        <button class="nav-btn active" onclick="trocarAba(event, 'aba-painel')">📅 Painel</button>
        <button class="nav-btn" onclick="trocarAba(event, 'aba-registro')">➕ Reserva</button>
        <button class="nav-btn" onclick="trocarAba(event, 'aba-historico')">📂 Histórico</button>
        <button class="nav-btn" onclick="trocarAba(event, 'aba-config')">⚙️ Unidades</button>
    </nav>
    <div class="footer-sidebar" style="padding: 15px;">
        <button onclick="toggleView()" style="width:100%; padding:8px; font-size:10px; cursor:pointer;">📱 Mudar Visual</button>
    </div>
</aside>

<main class="main-content">
    <div id="aba-painel" class="content-section active">
        <h2 id="tituloHoje">Carregando...</h2>
        <div class="painel-grid">
            <div><div class="col-header bg-ent">📥 CHECK-IN (ENTRADAS)</div><div id="listaEntradas"></div></div>
            <div><div class="col-header bg-sai">📤 CHECK-OUT (SAÍDAS)</div><div id="listaSaidas"></div></div>
        </div>
    </div>

    <div id="aba-registro" class="content-section">
        <h2>📝 Nova Reserva</h2>
        <div class="card-box">
            <label>Unidade</label><select id="selectApto"></select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Entrada</label><input type="date" id="dataEntrada"></div>
                <div style="flex:1"><label>Saída</label><input type="date" id="dataSaida"></div>
            </div>
            <label>Hóspedes (Nome e CPF)</label>
            <div id="containerHospedes">
                <div class="hospede-row">
                    <input type="text" class="nome-input" placeholder="Nome completo">
                    <input type="text" class="cpf-input" placeholder="CPF">
                </div>
            </div>
            <button onclick="adicionarCampoHospede()" style="margin: 10px 0; cursor:pointer;">+ Adicionar Hóspede</button>
            <button class="btn-primary" onclick="salvar()">Sincronizar Reserva ☁️</button>
        </div>
    </div>

    <div id="aba-historico" class="content-section"><h2>📂 Histórico Geral</h2><div id="listaGeral"></div></div>
    
    <div id="aba-config" class="content-section">
        <h2>⚙️ Gerenciar Unidades</h2>
        <div class="card-box">
            <input type="text" id="novoAptoNome" placeholder="Ex: Apartamento 101">
            <button class="btn-primary" onclick="addUnidade()">Adicionar Unidade</button>
        </div>
        <div id="listaUnidadesCadastradas"></div>
    </div>
</main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD10VDzmYJCeubBnEPGhbiddOgxazohe",
        authDomain: "hospedafacil-30521.firebaseapp.com",
        databaseURL: "https://hospedafacil-30521-default-rtdb.firebaseio.com/",
        projectId: "hospedafacil-30521",
        storageBucket: "hospedafacil-30521.firebasestorage.app",
        messagingSenderId: "982294374795",
        appId: "1:982294374795:web:582187cbccbe22bb7ce78e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function formatar(d) { return d ? d.split('-').reverse().join('/') : ""; }

    function adicionarCampoHospede() {
        const div = document.createElement('div');
        div.className = 'hospede-row';
        div.innerHTML = `<input type="text" class="nome-input" placeholder="Nome completo"><input type="text" class="cpf-input" placeholder="CPF">`;
        document.getElementById('containerHospedes').appendChild(div);
    }

    let dadosReservas = {};
    let dadosAptos = {};

    db.ref('aptos').on('value', snap => { dadosAptos = snap.val() || {}; renderizarTudo(); });
    db.ref('reservas').on('value', snap => { dadosReservas = snap.val() || {}; renderizarTudo(); });

    function renderizarTudo() {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('tituloHoje').innerText = "Hoje: " + formatar(hoje);
        
        const sel = document.getElementById('selectApto');
        const listaConf = document.getElementById('listaUnidadesCadastradas');
        sel.innerHTML = '<option value="">-- Selecione --</option>';
        listaConf.innerHTML = '';
        
        Object.keys(dadosAptos).forEach(a => {
            sel.innerHTML += `<option value="${a}">${a}</option>`;
            listaConf.innerHTML += `<div class="card-box" style="display:flex; justify-content:space-between; padding:10px;">🏠 ${a} <button onclick="db.ref('aptos/${a}').remove()" style="color:red; border:none; background:none; cursor:pointer;">✕</button></div>`;
        });

        const cEnt = document.getElementById('listaEntradas');
        const cSai = document.getElementById('listaSaidas');
        const cHist = document.getElementById('listaGeral');
        cEnt.innerHTML = ''; cSai.innerHTML = ''; cHist.innerHTML = '';

        Object.keys(dadosReservas).forEach(key => {
            const r = dadosReservas[key];
            let hospedesHTML = '';
            if (r.hospedes && Array.isArray(r.hospedes)) {
                hospedesHTML = r.hospedes.map(h => `👤 ${h.nome} <br> <small style="color:#7f8c8d; margin-left:18px;">CPF: ${h.cpf || 'N/A'}</small>`).join('<br>');
            } else {
                hospedesHTML = `👤 ${r.nomes || 'Hóspede'}`;
            }

            // NOVA EXIBIÇÃO: Apartamento + Período + Hóspedes
            const cardHtml = `
                <div class="apto-card">
                    <b>🏠 ${r.apto}</b>
                    <div class="date-badge">📅 ${formatar(r.e)} até ${formatar(r.s)}</div>
                    <div style="margin-top:8px;">${hospedesHTML}</div>
                </div>`;

            if(r.e === hoje) cEnt.innerHTML += cardHtml;
            if(r.s === hoje) cSai.innerHTML += cardHtml;
            
            cHist.innerHTML += `<div class="card-box" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${r.apto}</b> (${formatar(r.e)} - ${formatar(r.s)})<br>${hospedesHTML}</div>
                <button onclick="db.ref('reservas/${key}').remove()" style="color:red; border:none; background:none; cursor:pointer;">✕</button>
            </div>`;
        });
    }

    function salvar() {
        const apto = document.getElementById('selectApto').value;
        const e = document.getElementById('dataEntrada').value;
        const s = document.getElementById('dataSaida').value;
        const nomesInputs = document.querySelectorAll('.nome-input');
        const cpfInputs = document.querySelectorAll('.cpf-input');
        
        const hospedes = [];
        for (let i = 0; i < nomesInputs.length; i++) {
            if (nomesInputs[i].value) {
                hospedes.push({ nome: nomesInputs[i].value, cpf: cpfInputs[i].value });
            }
        }

        if(!apto || !e || !s || hospedes.length == 0) return alert("Preencha tudo!");
        if(e >= s) return alert("A data de saída deve ser após a entrada!");

        const conflito = Object.values(dadosReservas).find(r => {
            return r.apto === apto && ( (e >= r.e && e < r.s) || (s > r.e && s <= r.s) || (e <= r.e && s >= r.s) );
        });

        if (conflito) return alert(`⚠️ CONFLITO: Unidade ocupada até ${formatar(conflito.s)}.`);
        
        db.ref('reservas').push({ apto, e, s, hospedes }).then(() => {
            alert("Reserva Salva! ✅");
            document.getElementById('containerHospedes').innerHTML = `<div class="hospede-row"><input type="text" class="nome-input" placeholder="Nome completo"><input type="text" class="cpf-input" placeholder="CPF"></div>`;
            document.getElementById('dataEntrada').value = '';
            document.getElementById('dataSaida').value = '';
            trocarAba(null, 'aba-painel');
        });
    }

    function addUnidade() {
        const n = document.getElementById('novoAptoNome').value;
        if(n) db.ref('aptos/' + n).set(true).then(() => document.getElementById('novoAptoNome').value = '');
    }

    function trocarAba(event, id) {
        document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        if(event) event.currentTarget.classList.add("active");
    }
    function toggleView() { document.getElementById('mainBody').classList.toggle('mobile-mode'); }
</script>
</body>
</html>
